spring.application.name=core

# Database Connection Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/service_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Open-in-view: Hibernate sessiyasini butun request davomida ochiq saqlash.
# Bu Jackson LAZY proksilarni serializatsiya qilganda Hibernate'ga ma'lumotlarni
# yuklash imkonini beradi. Agar false bo'lsa, LAZY maydonlarga murojaat qilish
# LazyInitializationException bilan tugaydi.
spring.jpa.open-in-view=true

# Jackson serializatsiya sozlamalari
# Hibernate LAZY proksilari (masalan, Order.client, Order.worker) Jackson uchun
# "bo'sh bean" hisoblanadi. fail-on-empty-beans=false bo'lmasa, Jackson proksilarni
# serializatsiya qilolmay InvalidDefinitionException tashlaydi.
spring.jackson.serialization.fail-on-empty-beans=false

# JWT imzo kaliti - Spring Boot buni JWT_SECRET nomli OS environment o'zgaruvchisidan avtomatik
# o'qiydi (JwtTokenProvider'dagi @Value("${JWT_SECRET:}") orqali). PRODUCTIONDA albatta
# docker-compose/.env orqali o'rnatilishi shart, aks holda dev-fallback kalit ishlatiladi.

# CORS uchun ruxsat etilgan originlar (vergul bilan ajratilgan). Bo'sh bo'lsa faqat localhost'ga ruxsat.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3005,http://localhost:5173}

# Firebase Cloud Messaging (push bildirishnoma) uchun service account JSON fayli yo'li -
# FirebaseConfig.java buni FIREBASE_SERVICE_ACCOUNT_PATH OS environment o'zgaruvchisidan
# to'g'ridan-to'g'ri o'qiydi. Bo'sh qoldirilsa, push funksiyasi jimgina o'chirilgan holda qoladi.

# Spring Security TRACE loglari - DELETE 403 muammosini aniqlash uchun
logging.level.org.springframework.security=TRACE
