version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: service-core-db
    environment:
      - POSTGRES_DB=service_db
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend-java
    container_name: service-core-backend
    ports:
      - "8082:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3005}
      - FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      # FreeSWITCH ESL bilan aloqa - parol pastdagi "freeswitch" xizmatiga
      # o'rnatilgan qiymat bilan BIR XIL bo'lishi SHART, aks holda ESL
      # autentifikatsiyasi muvaffaqiyatsiz tugaydi.
      - FREESWITCH_ESL_HOST=freeswitch
      - FREESWITCH_ESL_PASSWORD=${FREESWITCH_ESL_PASSWORD:-changeme_esl_password_dev_only}
      # SIP hisob parollarini bazada shifrlash uchun (SipPasswordConverter).
      - SIP_CREDENTIALS_KEY=${SIP_CREDENTIALS_KEY:-}
    volumes:
      # Push bildirishnoma uchun Firebase Admin SDK service account kaliti (read-only).
      - ./backend-java/firebase-service-account.json:/app/firebase-service-account.json:ro
      # SipAccount yaratilganda FreeSwitchGatewayFileWriter shu papkaga gateway
      # XML fayli yozadi - freeswitch xizmati buni sip_profiles/external ostida
      # ko'rishi uchun ikkalasi ham SHU umumiy volume'ni ulashi kerak.
      - freeswitch_gateways:/freeswitch-gateways
      # Operatorning ichki SIP extension'i (Device) uchun - FreeSwitchExtensionFileWriter
      # shu yerga yozadi, freeswitch xizmati buni directory/default ostida ko'radi.
      # Bu MAVJUD gateway volume'dan BUTUNLAY ALOHIDA - trunk gateway'larga tegmaydi.
      - freeswitch_extensions:/freeswitch-extensions
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend-admin
    container_name: service-core-frontend
    ports:
      - "3005:80"
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: service-core-tunnel
    restart: always
    network_mode: "service:proxy"
    user: "root"
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "--protocol"
      - "http2"
      - "run"
      - "--token"
      - "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - proxy

  proxy:
    image: nginx:alpine
    container_name: service-core-proxy
    restart: always
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./proxy-nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  freeswitch:
    image: safarov/freeswitch:latest
    container_name: service-core-freeswitch
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "7443:7443"
      # MUHIM (WebRTC media/RTP uchun): brauzer (operator kompyuteri, NAT
      # ortida) bilan FreeSWITCH orasidagi ovoz (RTP/SRTP) shu UDP portlar
      # orqali oqadi. Signal (WSS) Cloudflare tunnel orqali kelsa ham, MEDIA
      # to'g'ridan-to'g'ri serverning ochiq IP'siga (84.54.75.20) keladi -
      # shuning uchun bu portlar host'da ochilishi SHART. Aks holda brauzer
      # javob bersa ham "no suitable candidates found" -> INCOMPATIBLE_DESTINATION
      # bilan darhol uziladi (jonli logda aniqlangan). Oraliq switch.conf.xml'da
      # 16384-16483 ga cheklangan (aks holda standart 16384-32768 = 16k port).
      - "16384-16483:16384-16483/udp"
      # 8021 (ESL) ATAYIN host'ga ochilmaydi - faqat ichki Docker tarmog'i
      # orqali "backend" xizmati yetadi (avval bu port internetga to'g'ridan-to'g'ri
      # ochiq edi va parol ham zaif "1234" edi - PBX'ni to'liq masofadan
      # boshqarish xavfi bor edi).
    environment:
      - SOUND_RATES=8000:16000
      - SOUND_LANGUAGES=en
      # backend xizmatidagi FREESWITCH_ESL_PASSWORD bilan BIR XIL bo'lishi SHART.
      - FREESWITCH_ESL_PASSWORD=${FREESWITCH_ESL_PASSWORD:-changeme_esl_password_dev_only}
    volumes:
      # FreeSwitchGatewayFileWriter (backend) shu papkaga yozadigan gateway
      # fayllari - vanilla "external" Sofia profili bu papkadagi *.xml
      # fayllarni avtomatik "include" qiladi (standart FreeSWITCH xatti-harakati).
      - freeswitch_gateways:/etc/freeswitch/sip_profiles/external
      # Operatorlarning ichki SIP extension'lari (FreeSwitchExtensionFileWriter,
      # backend) - vanilla directory/default.xml o'zining "default/*.xml"
      # fayllarini avtomatik "include" qiladi (tekshirilgan, gateway'lar bilan
      # bir xil mexanizm). Trunk gateway volume'idan ALOHIDA.
      - freeswitch_extensions:/etc/freeswitch/directory/default
      # Chiquvchi qo'ng'iroq dialplani (trunk JAVOB berganda brauzerga bridge).
      # BIND MOUNT - konteyner qayta yaratilsa ham saqlanadi (dialplan/*.xml
      # avtomatik include qilinadi, boshqa vanilla dialplan fayllariga tegmaydi).
      - ./freeswitch-dialplan/trunk_answered.xml:/etc/freeswitch/dialplan/trunk_answered.xml:ro
      # KIRUVCHI qo'ng'iroq dialplani (public/*.xml orqali "public" kontekstiga
      # include qilinadi) - tashqi mijoz qo'ng'irog'ini park qiladi, backend
      # CHANNEL_PARK'da kompaniyaning onlayn operatoriga bridge qiladi.
      - ./freeswitch-dialplan/public_incoming.xml:/etc/freeswitch/dialplan/public/01_route_to_operator.xml:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /etc/freeswitch/freeswitch.xml ]; then
          mkdir -p /etc/freeswitch
          cp -varf /usr/share/freeswitch/conf/vanilla/* /etc/freeswitch/
        fi
        sed -i "s/default_password=[^\"]*/default_password=$FREESWITCH_ESL_PASSWORD/" /etc/freeswitch/vars.xml
        # Bu image'ning vanilla event_socket.conf.xml'i parolni $${default_password}
        # o'zgaruvchisi orqali emas, "ClueCon" qiymatini TO'G'RIDAN-TO'G'RI (literal)
        # yozadi - shuning uchun yuqoridagi vars.xml o'zgarishi bu yerga ta'sir
        # qilmaydi, alohida almashtirish kerak (jonli konteynerda ESL "Connection
        # refused"/parol nomuvofiqligi sifatida aniqlangan xato).
        sed -i "s/value=\"ClueCon\"/value=\"$FREESWITCH_ESL_PASSWORD\"/" /etc/freeswitch/autoload_configs/event_socket.conf.xml
        sed -i 's/value="::"/value="0.0.0.0"/' /etc/freeswitch/autoload_configs/event_socket.conf.xml
        # Standart holatda mod_event_socket "loopback.auto" ACL'ni qo'llaydi
        # (fayldagi <!--apply-inbound-acl--> izohlangan bo'lsa ham) - bu backend
        # konteynerining Docker ichki tarmoq IP'sini rad etadi (jonli testda
        # "IP ... Rejected by acl 'loopback.auto'" sifatida aniqlangan). Faqat
        # "rfc1918.auto"ga almashtirish esa 127.0.0.1 (fs_cli/mahalliy konsol)ni
        # buzadi (RFC1918 localhost'ni o'z ichiga olmaydi) - shuning uchun
        # ikkalasini ham qamrab oladigan maxsus ACL qo'shamiz.
        sed -i 's|<network-lists>|<network-lists>\n    <list name="esl_internal" default="deny">\n      <node type="allow" cidr="127.0.0.0/8"/>\n      <node type="allow" cidr="10.0.0.0/8"/>\n      <node type="allow" cidr="172.16.0.0/12"/>\n      <node type="allow" cidr="192.168.0.0/16"/>\n    </list>|' /etc/freeswitch/autoload_configs/acl.conf.xml
        sed -i 's|<!--<param name="apply-inbound-acl" value="loopback.auto"/>-->|<param name="apply-inbound-acl" value="esl_internal"/>|' /etc/freeswitch/autoload_configs/event_socket.conf.xml
        # MUHIM (WebRTC media/NAT): FreeSWITCH SDP'da o'zining media manzili
        # sifatida standart holatda Docker ichki IP'sini (172.20.0.5) e'lon
        # qiladi - brauzer bunga yeta olmaydi. Serverning HAQIQIY ochiq IP'sini
        # (84.54.75.20) LITERAL qo'yamiz - shunda WebRTC ICE candidate'ga ham
        # to'g'ri qo'llaniladi (MUHIM: "stun:stun.freeswitch.org" shakli c= qatoriga
        # qo'llansa ham ICE candidate'ga qo'llanmасди -> a=candidate 172.20.0.5
        # qolib, brauzer media yo'lini topa olmasdi, OVOZ ikkala tomonга oqmasdi;
        # literal IP bilan candidate 84.54.75.20 bo'ladi va ovoz oqadi - jonli
        # sinovda tasdiqlangan). Agar server IP o'zgarsa - shu qiymatni yangilang.
        sed -i 's|name="ext-rtp-ip" value="[^"]*"|name="ext-rtp-ip" value="84.54.75.20"|' /etc/freeswitch/sip_profiles/internal.xml
        # ESLATMA: local-network-acl STANDART holatida (localnet.auto) qoldiriladi.
        # Brauzer SIP nginx (172.20.0.6, docker ichki tarmoq) orqali kelgani uchun
        # FreeSWITCH klientni "mahalliy" deb hisoblab, ICE candidate'ga o'zining
        # ICHKI IP'sini (172.20.0.5) qo'yadi. Bu ATAYIN shunday: coturn (TURN
        # server) AYNAN shu ichki IP'ga docker tarmog'i orqali bevosita yetadi va
        # media'ni brauzerga TCP orqali relay qiladi (Docker Desktop UDP yo'li
        # buzuq bo'lgani uchun). Ilgari "none" (84.54.75.20) sinaб ko'rilgan edi -
        # candidate to'g'ri bo'lsa ham Docker Desktop/WSL2 host UDP forwarding'i
        # buzuq bo'lgani uchun DTLS o'tmasdi; coturn TCP-relay yechimi shu sababli.
        # ext-sip-ip ATAYIN o'zgartirilmaydi: brauzer WSS (wss://.../ws/sip)
        # orqali nginx'dan o'tib ulanadi, shuning uchun internal profilning SIP
        # signalizatsiya manzili STUN bilan tashqi IP (84.54.75.20)ga
        # o'zgartirilsa, profil g'alati portga bog'lanib (masalan :54576)
        # brauzerning SIP REGISTER'i buziladi. Faqat MEDIA (ext-rtp-ip) tashqi
        # IP bo'lishi kerak - signalizatsiya WSS tunnel orqali boradi.
        # RTP port oralig'ini host'da ochilgan diapazon bilan bir xil qilib
        # cheklaymiz (docker-compose ports: 16384-16483). Standart 16384-32768
        # (16k port) ni host'da ochib bo'lmaydi.
        sed -i 's|<!-- <param name="rtp-start-port" value="16384"/> -->|<param name="rtp-start-port" value="16384"/>|' /etc/freeswitch/autoload_configs/switch.conf.xml
        sed -i 's|<!-- <param name="rtp-end-port" value="32768"/> -->|<param name="rtp-end-port" value="16483"/>|' /etc/freeswitch/autoload_configs/switch.conf.xml
        /usr/bin/freeswitch -nc -nf -nonat
    # MUHIM: image'ning o'ziga o'rnatilgan standart HEALTHCHECK (fs_cli -x
    # status, parolsiz) doim "unhealthy" ko'rsatardi - chunki biz ESL parolini
    # standart "ClueCon"dan almashtirganmiz (yuqoridagi entrypoint'da), lekin
    # image'ning /healthcheck.sh skripti buni bilmaydi. FreeSWITCH'ning o'zi
    # sog'lom bo'lsa ham (jonli fs_cli -p buyruqlari bilan tasdiqlangan),
    # Docker uni doim "unhealthy" deb ko'rsatardi - bu haqiqiy monitoring
    # signalini ishonchsiz qilib qo'yardi. Endi to'g'ri parol bilan qayta
    # belgilanadi.
    healthcheck:
      test: ["CMD-SHELL", "fs_cli -p \"$$FREESWITCH_ESL_PASSWORD\" -x status | grep -q ^UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # TURN server (coturn) - WebRTC ovoz (media) relay.
  # MUHIM SABAB: server Docker Desktop/WSL2 (Windows) da ishlaydi - u WebRTC
  # uchun kerakli UDP RTP portlarini ishonchli uzatolmaydi (host UDP forwarding
  # buzuq, symmetric NAT). Yechim: brauzer media'ni coturn'ga TCP orqali yuboradi
  # (Docker Desktop TCP'ni ISHONCHLI uzatadi), coturn esa FreeSWITCH'ga ICHKI
  # docker tarmog'i orqali (172.20.0.x, host UDP forwarding'siz) uzatadi. Shunday
  # qilib buzuq host UDP yo'li butunlay chetlab o'tiladi.
  # Brauzer: turn:<server>:3478?transport=tcp + iceTransportPolicy:'relay'.
  # FreeSWITCH internal profil o'zining ICHKI IP'sini (172.20.0.5) candidate
  # qilib e'lon qiladi - coturn ichkaridan bevosita yetadi (local-network-acl
  # standart holatga qaytarildi).
  coturn:
    image: coturn/coturn:latest
    container_name: service-core-coturn
    restart: always
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      # 443/TLS (turns) - ISP'lar 3478 ni bloklashi mumkin, lekin 443 (HTTPS
      # porti) deyarli har doim ochiq. Brauzer turns:<ip>:443?transport=tcp
      # bilan ulanadi - HTTPS trafik kabi ko'rinadi, hech qaysi ISP bloklaмaydi.
      - "443:443/tcp"
    volumes:
      - ./coturn-certs:/certs:ro
    command:
      - "-n"
      - "--log-file=stdout"
      - "--listening-port=3478"
      - "--tls-listening-port=443"
      - "--cert=/certs/turn_cert.pem"
      - "--pkey=/certs/turn_pkey.pem"
      - "--realm=namifor.ecos.uz"
      - "--fingerprint"
      - "--lt-cred-mech"
      - "--user=webrtc:webrtcTURN2026x9k4relay"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--no-dtls"
      - "--no-cli"
      - "--no-multicast-peers"

volumes:
  postgres_data:
  freeswitch_gateways:
  freeswitch_extensions:
