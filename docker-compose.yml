version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: service-core-db
    environment:
      - POSTGRES_DB=service_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend-java
    container_name: service-core-backend
    ports:
      - "8006:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend-admin
    container_name: service-core-frontend
    ports:
      - "3006:80"
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: service-core-tunnel
    restart: always
    network_mode: "service:proxy"
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "run"
      - "--token"
      - "eyJhIjoiMDI5NDc1MzY0YWNjNDEzY2Q2Y2YzNWVkOGU0MjEzNGIiLCJ0IjoiZWQ1NmJmNDEtOWRlMS00ZTZmLWE5Y2YtMWMxM2ZhN2UyZGEzIiwicyI6Ik1URTBZakl3WkRFdE5XSXhOQzAwTnpJeExUbGlaVEV0TVRZME5qUm1OR0UxTW1GbSJ9"
    depends_on:
      - proxy

  proxy:
    image: nginx:alpine
    container_name: service-core-proxy
    restart: always
    volumes:
      - ./proxy-nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
