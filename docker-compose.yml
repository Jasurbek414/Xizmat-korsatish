version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: service-core-db
    environment:
      - POSTGRES_DB=service_db
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend-java
    container_name: service-core-backend
    ports:
      - "8082:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3005}
      - FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH:-}
    # Push bildirishnomani yoqish uchun: Firebase Console'dan service account JSON kalitini
    # backend-java/firebase-service-account.json sifatida saqlang, keyin quyidagi qatorni
    # va yuqoridagi FIREBASE_SERVICE_ACCOUNT_PATH qiymatini ("/app/firebase-service-account.json")
    # .env faylida faollashtiring:
    # volumes:
    #   - ./backend-java/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend-admin
    container_name: service-core-frontend
    ports:
      - "3005:80"
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: service-core-tunnel
    restart: always
    network_mode: "service:proxy"
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "--protocol"
      - "http2"
      - "run"
      - "--token"
      - "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - proxy

  proxy:
    image: nginx:alpine
    container_name: service-core-proxy
    restart: always
    volumes:
      - ./proxy-nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
