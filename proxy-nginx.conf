limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 3005;
    listen [::]:3005;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Standart 60s o'rniga - uzoq muddatli WebSocket ulanishi (chaqiruv
        # nazorat kanali) vaqtidan oldin uzilib qolmasligi uchun.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /ws/sip {
        # MUHIM: brauzer https/wss orqali ulanadi, shuning uchun JsSIP o'z SIP
        # xabarlarida "Via: SIP/2.0/WSS" deb e'lon qiladi. Agar bu yerni oddiy
        # "ws" portiga (5066) yo'naltirsak, FreeSWITCH e'lon qilingan transport
        # (WSS) bilan haqiqiy ulanish turi (TLS'siz) mos kelmasligini sezib,
        # REGISTER so'rovini JIM tashlab yuboradi (javobsiz "Request Timeout" -
        # jonli sinovda aniq tasdiqlangan xato). Shuning uchun FreeSWITCH'ning
        # HAQIQIY wss-binding portiga (7443, o'zining TLS bilan) ulanamiz -
        # bu holda Via'dagi WSS e'loni haqiqatan ham TLS orqali kelgan bilan
        # mos keladi va FreeSWITCH to'g'ri javob beradi (jonli sinovda
        # tasdiqlangan: 401 -> digest -> 200 OK).
        proxy_pass https://freeswitch:7443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Standart 60s o'rniga - jonli sinovda ulanish har 1-2 daqiqada
        # uzilib-qayta ulanayotgani aniqlangan edi (bo'sh turgan WebSocket
        # ulanishi muddati tugashi sababli).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Cloudflare tunnel'da alohida "namifor-api.ecos.uz" hostnomi shu portga
# to'g'ridan-to'g'ri yo'naltirilgan (tashqi integratsiyalar backend API'ga
# bevosita shu orqali kirishadi). Endi rate-limit va xavfsizlik header'lari bilan.
server {
    listen 8080;
    listen [::]:8080;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
